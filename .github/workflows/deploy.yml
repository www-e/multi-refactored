name: Agentic Auto-Deploy

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_and_verify:
    name: Build, Deploy & Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Executing remote SSH commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e  # Exit on any error

            # --- CONFIGURATION ---
            PROJECT_DIR="/var/www/voice_agent"
            DB_CONTAINER="agentic_portal_db"
            BACKEND_CONTAINER="agentic_portal_backend"
            FRONTEND_CONTAINER="agentic_portal_frontend"
            MAX_WAIT_SECONDS=120

            echo "🚀 Starting deployment process..."
            echo "📁 Project directory: $PROJECT_DIR"

            # --- PRE-DEPLOYMENT CHECKS ---
            echo "🔍 Pre-deployment checks..."

            # Check disk space
            AVAILABLE_SPACE=$(df / | tail -1 | awk '{print $4}')
            if [ "$AVAILABLE_SPACE" -lt 1048576 ]; then
                echo "⚠️  WARNING: Low disk space ($AVAILABLE_SPACE KB available)"
                echo "🧹 Pruning unused Docker images..."
                docker image prune -a -f
            else
                echo "✅ Sufficient disk space available"
            fi

            # Navigate to project directory
            cd $PROJECT_DIR || exit 1
            echo "✅ Changed to project directory"

            # Store current commit for potential rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "none")
            echo "📌 Current commit: $PREVIOUS_COMMIT"

            # --- CODE UPDATE ---
            echo "📥 Pulling latest code from main branch..."
            git fetch origin main
            CURRENT_COMMIT=$(git rev-parse origin/main)
            echo "📊 Deploying: $PREVIOUS_COMMIT → $CURRENT_COMMIT"

            # Backup current state
            if [ "$PREVIOUS_COMMIT" != "none" ]; then
                echo "💾 Creating database backup before deployment..."
                BACKUP_FILE="backups/agentic_portal_$(date +%Y%m%d_%H%M%S).sql"
                mkdir -p backups

                if docker exec $DB_CONTAINER pg_dump -U navaia navaia > "$BACKUP_FILE" 2>/dev/null; then
                    echo "✅ Database backup created: $BACKUP_FILE"
                    # Keep only last 5 backups
                    ls -t backups/*.sql 2>/dev/null | tail -n +6 | xargs -r rm
                    echo "🧹 Cleaned old backups (kept last 5)"
                else
                    echo "⚠️  Backup skipped (database may not exist yet)"
                fi
            fi

            # Reset to latest code
            echo "🔄 Resetting to latest code..."
            git reset --hard origin/main
            echo "✅ Code updated successfully"

            # --- DOCKER DEPLOYMENT ---
            echo "🏗️ Building and starting Docker containers..."

            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker-compose down 2>/dev/null || true

            # Build and start new containers
            if ! docker-compose up -d --build --force-recreate --remove-orphans; then
                echo "❌ Docker build/start failed!"
                echo "🔄 Rolling back to previous commit..."

                if [ "$PREVIOUS_COMMIT" != "none" ]; then
                    git reset --hard $PREVIOUS_COMMIT
                    docker-compose up -d --build
                    echo "✅ Rollback completed"
                fi
                exit 1
            fi

            echo "✅ Docker containers built and started"

            # --- DATABASE HEALTH CHECK ---
            echo "⏳ Waiting for PostgreSQL to be ready..."
            WAIT_TIME=0
            while [ $WAIT_TIME -lt 30 ]; do
                if docker exec $DB_CONTAINER pg_isready -U navaia > /dev/null 2>&1; then
                    echo "✅ PostgreSQL is ready!"
                    break
                fi
                sleep 1
                WAIT_TIME=$((WAIT_TIME + 1))
            done

            if [ $WAIT_TIME -ge 30 ]; then
                echo "❌ PostgreSQL failed to start within 30 seconds"
                docker logs $DB_CONTAINER --tail 50
                exit 1
            fi

            # --- MIGRATIONS ---
            echo "🔄 Running database migrations..."

            # Run migration with timeout
            MIGRATION_START=$(date +%s)
            if ! timeout 60 docker exec $BACKEND_CONTAINER python /app/scripts/smart_migrate.py; then
                MIGRATION_END=$(date +%s)
                MIGRATION_DURATION=$((MIGRATION_END - MIGRATION_START))

                echo "❌ Migration failed after ${MIGRATION_DURATION}s!"
                echo "📋 Backend logs:"
                docker logs $BACKEND_CONTAINER --tail 100

                # Check if it's a migration conflict
                echo "🔍 Checking migration status..."
                docker exec $BACKEND_CONTAINER alembic current 2>/dev/null || true
                docker exec $BACKEND_CONTAINER alembic heads 2>/dev/null || true

                echo "💥 Deployment failed due to migration errors"
                exit 1
            fi

            MIGRATION_END=$(date +%s)
            MIGRATION_DURATION=$((MIGRATION_END - MIGRATION_START))
            echo "✅ Migrations completed successfully in ${MIGRATION_DURATION}s!"

            # --- POST-DEPLOYMENT CLEANUP ---
            echo "🧹 Cleaning up unused Docker resources..."
            docker image prune -f
            echo "✅ Cleanup completed"

            # --- SERVICE WARMUP ---
            echo "💤 Warming up services (waiting 10s)..."
            sleep 10

            # --- HEALTH CHECKS ---
            check_health() {
                local url=$1
                local name=$2
                local max_retries=24
                local wait_time=5

                echo "🏥 Checking $name health at $url..."

                for i in $(seq 1 $max_retries); do
                    # Capture HTTP Status Code (000 = Connection Failed)
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 5 2>/dev/null || echo "000")

                    # Accept 2xx and 3xx as healthy
                    if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                        echo "✅ $name is HEALTHY! (Status: $STATUS, waited $((i * wait_time))s)"
                        return 0
                    fi

                    echo "⏳ $name not ready (Status: $STATUS)... retry ${i}/${max_retries} (${wait_time}s)"
                    sleep $wait_time
                done

                echo "❌ $name failed health check after $((max_retries * wait_time))s"
                return 1
            }

            # Check Backend Health
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 BACKEND HEALTH CHECK"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if ! check_health "http://127.0.0.1:8000/healthz" "Backend"; then
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "📋 BACKEND LOGS (last 100 lines):"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                docker logs $BACKEND_CONTAINER --tail 100
                echo ""
                echo "💥 Backend health check failed!"
                exit 1
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 FRONTEND HEALTH CHECK"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Check Frontend Health
            if ! check_health "http://127.0.0.1:3001" "Frontend"; then
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "📋 FRONTEND LOGS (last 100 lines):"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                docker logs $FRONTEND_CONTAINER --tail 100
                echo ""
                echo "💥 Frontend health check failed!"
                exit 1
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🎉 DEPLOYMENT SUCCESSFUL!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Backend: http://127.0.0.1:8000"
            echo "✅ Frontend: http://127.0.0.1:3001"
            echo "✅ Backup: ${BACKUP_FILE:-none}"
            echo "✅ Commit: $CURRENT_COMMIT"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
